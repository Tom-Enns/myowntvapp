services:
  myowntvapp:
    build: .
    container_name: myowntvapp
    # host networking required so Apple TV can reach the proxy
    # and pyatv can discover devices via mDNS
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - PUBLIC_HOST=
    restart: unless-stopped
    # On Mac (Docker Desktop doesn't support network_mode: host):
    # Comment out network_mode: host and uncomment below:
    # ports:
    #   - "8080:8080"
    # environment:
    #   - PUBLIC_HOST=YOUR_MAC_IP:8080
